[pytest]
log_cli = 1
log_cli_level = DEBUG
log_cli_format = %(message)s

log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_file_date_format = %Y-%m-%d %H:%H:%S

junit_logging =all
junit_duration_report = total
junit_family = xunit2
junit_suite_name = TB_actions

markers =
	sanity: These should pass before doing any other tests
	samsung
	pixel
	ios
	bluetooth_connection
	mobile_app_installation
	halo
	700
	merlin